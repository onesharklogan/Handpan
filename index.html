<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D Kurd Handpan Sequencer</title>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0f172a;
      --panel:rgba(15,23,42,0.82);
      --panelBorder:rgba(148,163,184,0.14);
      --text:#e5eefb;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --accent2:#f59e0b;
      --cell:#223247;
      --cellActive:#38bdf8;
      --cellPlay:#f59e0b;
      --note:#e2e8f0;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:radial-gradient(circle at top,#172554 0%,#0f172a 32%,#07111f 100%);
      color:var(--text);
      padding:24px;
    }
    .app{max-width:1220px;margin:auto;display:grid;gap:18px}
    h2{margin:0;font-size:2rem;letter-spacing:.02em}
    .subtitle{color:var(--muted);margin-top:-6px}
    .layout{display:grid;grid-template-columns:400px 1fr;gap:18px;align-items:start}
    .panel{
      background:var(--panel);
      border:1px solid var(--panelBorder);
      padding:16px;
      border-radius:20px;
      box-shadow:0 18px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.03);
      backdrop-filter:blur(12px);
    }
    .handpan{
      position:relative;
      width:100%;
      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#334155 0%,#1e293b 35%,#0f172a 70%,#020617 100%);
      box-shadow:inset 0 0 40px rgba(255,255,255,.05), 0 20px 38px rgba(0,0,0,.28);
      overflow:hidden;
    }
    .handpan::before,.handpan::after{
      content:"";
      position:absolute;
      inset:9%;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      pointer-events:none;
    }
    .handpan::after{inset:23%;border-color:rgba(56,189,248,.14)}
    .note{
      position:absolute;
      width:70px;
      height:70px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#fff 0%,var(--note) 60%,#cbd5e1 100%);
      color:#0f172a;
      display:grid;
      place-items:center;
      cursor:pointer;
      transform:translate(-50%,-50%);
      font-weight:700;
      border:1px solid rgba(15,23,42,.08);
      box-shadow:0 10px 20px rgba(0,0,0,.18);
      transition:transform .14s ease, box-shadow .14s ease, background .25s ease, box-shadow .25s ease, opacity .25s ease;
    }
    }
    .note:hover{transform:translate(-50%,-50%) scale(1.04);box-shadow:0 0 0 8px rgba(56,189,248,.12),0 12px 24px rgba(0,0,0,.22)}
    .note.active{
      background:radial-gradient(circle at 35% 30%,#fde68a 0%,#f59e0b 70%,#d97706 100%);
      box-shadow:0 0 0 12px rgba(245,158,11,0.18), 0 12px 28px rgba(0,0,0,.25);
    }
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
    button,input,select{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.16);
      background:#111c2f;
      color:var(--text);
      font:inherit;
    }
    button{cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease}
    button:hover,select:hover,input:hover{border-color:rgba(56,189,248,.45)}
    button:hover{transform:translateY(-1px);background:#16243a}
    label{display:flex;align-items:center;gap:8px;color:var(--muted);background:#0d1828;padding:8px 10px;border-radius:12px;border:1px solid rgba(148,163,184,.12)}
    #status{margin-top:12px;color:var(--muted);min-height:24px}
    .row{display:grid;grid-template-columns:68px repeat(32,28px);gap:6px;margin-bottom:6px;align-items:center}
    .row div:first-child{color:#cbd5e1;font-weight:700;text-align:right;padding-right:6px}
    .cell{width:28px;height:28px;background:var(--cell);cursor:pointer;border-radius:8px;border:1px solid rgba(148,163,184,.08);transition:transform .1s ease,background .1s ease}
    .cell:hover{transform:translateY(-1px)}
    .cell.active{background:var(--cellActive)}
    .cell.playhead{background:var(--cellPlay)}
    #seq{overflow-x:auto;padding-bottom:6px}
    #seq::-webkit-scrollbar{height:10px}
    #seq::-webkit-scrollbar-thumb{background:#334155;border-radius:999px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.handpan{max-width:420px;margin:auto}}
  </style>
</head>

<button id="export">Export</button>

<label>BPM <input id="bpm" type="range" min="60" max="200" value="90"></label>
<span id="bpmVal">90</span>

<label>Swing <input id="swing" type="range" min="0" max="40" value="10"></label>
<span id="swingVal">10%</span>
</div>

<div id="seq"></div>
</div>
</div>
</div>

const bpmVal=document.getElementById('bpmVal');
const swingInput=document.getElementById('swing');
const swingVal=document.getElementById('swingVal');

const seqEl=document.getElementById('seq');
const handpan=document.getElementById('handpan');
const select=document.getElementById('patternSelect');
const nameInput=document.getElementById('patternName');

function getBpm(){return Number(bpmInput.value)}
function getSwing(){return Number(swingInput.value)/100}

// UI
const noteEls = [];
notes.forEach((n,i)=>{
let el=document.createElement('div');
el.className='note';
el.style.left=n.x+'%';el.style.top=n.y+'%';
el.textContent=n.n;
el.onclick=()=>playNote(i);
handpan.appendChild(el);
noteEls.push(el);
});

function render(){
seqEl.innerHTML='';
notes.forEach((n,r)=>{
let row=document.createElement('div');row.className='row';
let label=document.createElement('div');label.textContent=n.n;row.appendChild(label);
for(let c=0;c<steps;c++){
let cell=document.createElement('div');
cell.className='cell'+(sequence[r][c]?' active':'');
if(c===step) cell.classList.add('playhead');
cell.onclick=()=>{sequence[r][c]^=1;render()};
row.appendChild(cell);
}
seqEl.appendChild(row);
});
}

// pattern system
function refreshDropdown(){
select.innerHTML="<option value=''>Load Pattern</option>";
Object.keys(builtIn).forEach(n=>select.innerHTML+=`<option>⭐ ${n}</option>`);
Object.keys(userPatterns).forEach(n=>select.innerHTML+=`<option>${n}</option>`);
}

function loadPattern(name){
let data=builtIn[name]||userPatterns[name];
if(!data)return;
sequence=Array.from({length:notes.length},()=>Array(steps).fill(0));
notes.forEach((note,i)=>{
(data.data||{} )[note.n]?.forEach(s=>sequence[i][s]=1);
});
nameInput.value=name+" copy";
render();
}

function savePattern(){
let name=nameInput.value||"pattern";
userPatterns[name]={data:{}};
notes.forEach((note,i)=>{
userPatterns[name].data[note.n]=[];
sequence[i].forEach((v,s)=>{if(v)userPatterns[name].data[note.n].push(s)});
});
localStorage.setItem('patterns',JSON.stringify(userPatterns));
refreshDropdown();
}

// EXPORT
function exportPattern(){
let name=nameInput.value||"pattern";
let data={name,data:{}};
notes.forEach((note,i)=>{
  data.data[note.n]=[];
  sequence[i].forEach((v,s)=>{if(v)data.data[note.n].push(s)});
});
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download=name+".json";
a.click();
}

// IMPORT
function importPattern(file){
const reader=new FileReader();
reader.onload=e=>{
  const data=JSON.parse(e.target.result);
  userPatterns[data.name]=data;
  localStorage.setItem('patterns',JSON.stringify(userPatterns));
  refreshDropdown();
};
reader.readAsText(file);
}

// audio (enhanced handpan-like synthesis)
const ctx=new AudioContext();

function playNote(i){
  if(ctx.state==='suspended') ctx.resume();

  const freq = notes[i].f;
  const now = ctx.currentTime;

  // visual hit (flash the note)
  const el = noteEls[i];
  if(el){
    el.classList.add('active');
    setTimeout(()=>el.classList.remove('active'), 320);
  }

  // main oscillators
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const shimmer = ctx.createOscillator();

  osc1.type='sine';
  osc2.type='triangle';
  shimmer.type='sine';

  osc1.frequency.value = freq;
  osc2.frequency.value = freq * 2;
  shimmer.frequency.value = freq * 3.01;

  // noise for attack
  const bufferSize = ctx.sampleRate * 0.2;
  const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i]=Math.random()*2-1; }
  const noise = ctx.createBufferSource();
  noise.buffer = noiseBuffer;

  // gain + filter
  const gain = ctx.createGain();
  const noiseGain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  filter.type='lowpass';
  filter.frequency.setValueAtTime(2500, now);
  filter.Q.value = 1.2;

  // envelope
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.28, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.12, now + 0.08);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);

  noiseGain.gain.setValueAtTime(0.2, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);

  // connect graph
  osc1.connect(gain);
  osc2.connect(gain);
  shimmer.connect(gain);

  noise.connect(noiseGain);
  noiseGain.connect(gain);

  gain.connect(filter);
  filter.connect(ctx.destination);

  // start/stop
  osc1.start(now);
  osc2.start(now);
  shimmer.start(now);
  noise.start(now);

  osc1.stop(now + 0.9);
  osc2.stop(now + 0.9);
  shimmer.stop(now + 0.9);
  noise.stop(now + 0.1);
}

function stepDuration(){return 60000/getBpm()/4}

function tick(){
  render();
  // clear previous highlights
  noteEls.forEach(el=>el.classList.remove('active'));
  // play and highlight current step
  for(let r=0;r<notes.length;r++){
    if(sequence[r][step]){
      playNote(r);
    }
  }
let current=step;
step=(step+1)%steps;

if(!playing)return;
let base=stepDuration();
let swing=getSwing();
let delay=current%2?base*(1+swing):base*(1-swing);

timer=setTimeout(tick,delay);
}

// events
document.getElementById('play').onclick=()=>{if(!playing){playing=true;tick()}};
document.getElementById('stop').onclick=()=>{playing=false;clearTimeout(timer)};
document.getElementById('clear').onclick=()=>{sequence=sequence.map(r=>r.map(()=>0));render()};
document.getElementById('save').onclick=savePattern;
document.getElementById('export').onclick=exportPattern;
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>importPattern(e.target.files[0]);

select.onchange=e=>{
let name=e.target.value.replace('⭐ ','');
loadPattern(name);
};

bpmInput.oninput=()=>bpmVal.textContent=bpmInput.value;
swingInput.oninput=()=>swingVal.textContent=swingInput.value+'%';

refreshDropdown();
render();
</script>
</body>
