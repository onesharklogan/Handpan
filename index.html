<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D Kurd Handpan Sequencer</title>

<style>
:root{
  --bg:#07111f;
  --bg2:#0f172a;
  --panel:rgba(15,23,42,0.82);
  --panelBorder:rgba(148,163,184,0.14);
  --text:#e5eefb;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --accent2:#f59e0b;
  --cell:#223247;
  --cellActive:#38bdf8;
  --cellPlay:#f59e0b;
  --note:#e2e8f0;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:radial-gradient(circle at top,#172554 0%,#0f172a 32%,#07111f 100%);
  color:var(--text);
  padding:24px;
}
.app{max-width:1220px;margin:auto;display:grid;gap:18px}
h2{margin:0;font-size:2rem}
.subtitle{color:var(--muted);margin-top:-6px}
.layout{display:grid;grid-template-columns:400px 1fr;gap:18px}

.panel{
  background:var(--panel);
  border:1px solid var(--panelBorder);
  padding:16px;
  border-radius:20px;
}

/* HANDPAN */
.handpan{
  position:relative;
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#334155 0%,#1e293b 35%,#0f172a 70%,#020617 100%);
}

.note{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#e2e8f0;
  color:#0f172a;
  display:grid;
  place-items:center;
  cursor:pointer;
  transform:translate(-50%,-50%);
  font-weight:700;
}

.note:hover{
  transform:translate(-50%,-50%) scale(1.05);
}

.note.active{
  background:#f59e0b;
}

/* SEQUENCER */
.row{
  display:grid;
  grid-template-columns:68px repeat(32,28px);
  gap:6px;
  margin-bottom:6px;
}

.cell{
  width:28px;
  height:28px;
  background:#223247;
  cursor:pointer;
  border-radius:6px;
}

.cell.active{background:#38bdf8}
.cell.playhead{background:#f59e0b}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
button,input,select{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #334155;
  background:#111c2f;
  color:white;
}
</style>
</head>

<body>

<div class="app">
<h2>D Kurd Handpan Sequencer</h2>
<div class="layout">

<div class="panel">
<div class="handpan" id="handpan"></div>
</div>

<div class="panel">
<div class="controls">
<button id="play">Play</button>
<button id="stop">Stop</button>
<button id="clear">Clear</button>

<label>BPM <input id="bpm" type="range" min="60" max="200" value="90"></label>
<span id="bpmVal">90</span>
</div>

<div id="seq"></div>
</div>

</div>
</div>

<script>
/* AUDIO CONTEXT FIX (CRITICAL FOR RENDER) */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
document.body.addEventListener("click", () => {
  if (ctx.state === "suspended") ctx.resume();
}, { once: true });

const notes=[
{n:'D3',f:146,x:50,y:50},
{n:'A4',f:440,x:50,y:10},
{n:'G4',f:392,x:75,y:25},
{n:'E4',f:329,x:90,y:50},
{n:'C4',f:261,x:75,y:75},
{n:'A3',f:220,x:50,y:90},
{n:'Bb3',f:233,x:25,y:75},
{n:'D4',f:293,x:10,y:50},
{n:'F4',f:349,x:25,y:25}
];

const steps=32;
let sequence=Array.from({length:notes.length},()=>Array(steps).fill(0));
let step=0,playing=false,timer;

const handpan=document.getElementById('handpan');
const seqEl=document.getElementById('seq');

const noteEls=[];
notes.forEach((n,i)=>{
  let el=document.createElement('div');
  el.className='note';
  el.style.left=n.x+'%';
  el.style.top=n.y+'%';
  el.textContent=n.n;
  el.onclick=()=>playNote(i);
  handpan.appendChild(el);
  noteEls.push(el);
});

function render(){
  seqEl.innerHTML='';
  notes.forEach((n,r)=>{
    let row=document.createElement('div');
    row.className='row';

    let label=document.createElement('div');
    label.textContent=n.n;
    row.appendChild(label);

    for(let c=0;c<steps;c++){
      let cell=document.createElement('div');
      cell.className='cell'+(sequence[r][c]?' active':'');
      if(c===step) cell.classList.add('playhead');

      cell.onclick=()=>{
        sequence[r][c]^=1;
        render();
      };

      row.appendChild(cell);
    }
    seqEl.appendChild(row);
  });
}

function playNote(i){
  if(ctx.state==='suspended') ctx.resume();

  const osc=ctx.createOscillator();
  const gain=ctx.createGain();

  osc.frequency.value=notes[i].f;
  osc.type='sine';

  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime+0.5);

  noteEls[i].classList.add('active');
  setTimeout(()=>noteEls[i].classList.remove('active'),200);
}

function stepDuration(){return 60000/Number(document.getElementById('bpm').value)/4}

function tick(){
  render();

  for(let r=0;r<notes.length;r++){
    if(sequence[r][step]) playNote(r);
  }

  step=(step+1)%steps;

  if(playing){
    timer=setTimeout(tick,stepDuration());
  }
}

/* CONTROLS */
document.getElementById('play').onclick=()=>{
  if(!playing){playing=true;tick()}
};

document.getElementById('stop').onclick=()=>{
  playing=false;
  clearTimeout(timer);
};

document.getElementById('clear').onclick=()=>{
  sequence=sequence.map(r=>r.map(()=>0));
  render();
};

document.getElementById('bpm').oninput=e=>{
  document.getElementById('bpmVal').textContent=e.target.value;
};

render();
</script>

</body>
</html>
