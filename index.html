<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D Kurd Handpan Sequencer Pro</title>

<style>
:root{
  --bg:#07111f;
  --bg2:#0f172a;
  --panel:rgba(15,23,42,0.9);
  --panelBorder:rgba(148,163,184,0.1);
  --text:#e5eefb;
  --muted:#64748b;
  --accent:#38bdf8;
  --accent2:#f59e0b;
  --cell:#1e293b;
  --cellActive:#38bdf8;
}

body{
  margin:0;
  font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(circle at top, #1e293b 0%, #0f172a 40%, #020617 100%);
  color: var(--text);
  padding: 20px;
  min-height: 100vh;
}

.app{ max-width: 1400px; margin: auto; display: grid; gap: 20px; }

.layout{ 
  display: grid; 
  grid-template-columns: 400px 1fr; 
  gap: 24px; 
  align-items: start;
}

.panel{
  background: var(--panel);
  border: 1px solid var(--panelBorder);
  padding: 20px;
  border-radius: 24px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* Handpan Styles */
.handpan-container { position: relative; width: 100%; aspect-ratio: 1; }
.handpan{
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #334155 0%, #1e293b 35%, #0f172a 70%, #020617 100%);
}

.note-btn{
  position: absolute;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: linear-gradient(145deg, #f0f4f8, #cbd5e1);
  color: #0f172a;
  display: grid;
  place-items: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
  font-weight: 800;
  transition: all 0.1s ease;
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  z-index: 2;
}

/* Lighting up when triggered */
.note-btn.playing {
  background: var(--accent2);
  box-shadow: 0 0 30px var(--accent2);
  transform: translate(-50%, -50%) scale(1.15);
  color: white;
}

/* Sequencer Grid Styles */
#seq-container { overflow-x: auto; padding: 10px 0; }
.timeline-grid { display: flex; flex-direction: column; gap: 10px; } /* Vertical Spacing */
.row { display: grid; grid-template-columns: 60px repeat(32, 1fr); gap: 4px; align-items: center; }
.row-label { font-weight: bold; color: var(--accent); text-align: right; padding-right: 12px; font-size: 0.85rem; }

.cell {
  aspect-ratio: 1;
  background: var(--cell);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s;
}
.cell.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.cell.playhead { outline: 2px solid var(--accent2); outline-offset: 1px; z-index: 5; }

/* Controls */
.controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
button, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; }
#play { background: #059669; border: none; }
#stop { background: #dc2626; border: none; }
</style>
</head>

<body>

    <div class="panel">
      <div class="handpan-container">
        <div class="handpan" id="handpan"></div>
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <button id="play">▶ Play</button>
        <button id="stop">■ Stop</button>
        <button id="clear">Clear Grid</button>
        <select id="patternSelect"></select>
        <div style="display:flex; align-items:center; gap:10px;">
          <span>BPM</span>
          <input id="bpm" type="range" min="60" max="200" value="95">
          <span id="bpmVal">95</span>
        </div>
      </div>

      <div id="seq-container">
        <div id="seq" class="timeline-grid"></div>
      </div>
    </div>
  </div>

// UI BUILDER
function init() {
  const hp = document.getElementById('handpan');
  notes.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'note-btn';
    el.style.left = n.x + '%';
    el.style.top = n.y + '%';
    el.textContent = n.n;
    el.onclick = () => { playNote(i); triggerVisualNote(i); };
    hp.appendChild(el);
    noteEls.push(el);
  });

  const sel = document.getElementById('patternSelect');
  sel.innerHTML = '<option value="">-- Select Lesson/Pattern --</option>';
  Object.keys(builtIn).forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k;
    sel.appendChild(opt);
  });

  renderGrid();
}

function renderGrid() {
  const seq = document.getElementById('seq');
  seq.innerHTML = '';
  notes.forEach((note, r) => {
    const row = document.createElement('div');
    row.className = 'row';
    const label = document.createElement('div');
    label.className = 'row-label';
    label.textContent = note.n;
    row.appendChild(label);

    for(let c=0; c<steps; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (sequence[r][c] ? ' active' : '');
      cell.id = `cell-${r}-${c}`;
      cell.onclick = () => {
        sequence[r][c] = sequence[r][c] ? 0 : 1;
        cell.classList.toggle('active');
      };
      row.appendChild(cell);
    }
    seq.appendChild(row);
  });
}

function triggerVisualNote(index) {
  noteEls[index].classList.add('playing');
  setTimeout(() => noteEls[index].classList.remove('playing'), 150);
}

function playNote(i) {
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.frequency.setValueAtTime(notes[i].f, now);
  g.gain.setValueAtTime(0.3, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
  osc.connect(g);
  g.connect(ctx.destination);
  osc.start();
  osc.stop(now + 0.6);
}

// SCHEDULER
function scheduler() {
  while (nextStepTime < ctx.currentTime + 0.1) {
    playStep(currentStep, nextStepTime);
    nextStepTime += (60 / document.getElementById('bpm').value) / 4;
    currentStep = (currentStep + 1) % steps;
  }
  if (playing) requestAnimationFrame(scheduler);
}

function playStep(s, time) {
  notes.forEach((n, r) => {
    if (sequence[r][s]) {
      const delay = Math.max(0, (time - ctx.currentTime) * 1000);
      setTimeout(() => {
        playNote(r);
        triggerVisualNote(r);
      }, delay);
    }
    // Update Playhead Visuals
    const cell = document.getElementById(`cell-${r}-${s}`);
    const prev = document.getElementById(`cell-${r}-${(s + steps - 1) % steps}`);
    if(cell) cell.classList.add('playhead');
    if(prev) prev.classList.remove('playhead');
  });
}

// EVENT LISTENERS
document.getElementById('play').onclick = () => {
  if (ctx.state === 'suspended') ctx.resume();
  if (!playing) {
    playing = true;
    nextStepTime = ctx.currentTime;
    scheduler();
  }
};

document.getElementById('stop').onclick = () => {
  playing = false;
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('playhead'));
  currentStep = 0;
};

document.getElementById('clear').onclick = () => {
  sequence = Array.from({length: notes.length}, () => Array(steps).fill(0));
  renderGrid();
};

document.getElementById('patternSelect').onchange = (e) => {
  const data = builtIn[e.target.value];
  if(!data) return;
  sequence = Array.from({length: notes.length}, () => Array(steps).fill(0));
  notes.forEach((n, i) => {
    if(data[n.n]) data[n.n].forEach(stepIdx => sequence[i][stepIdx] = 1);
  });
  renderGrid();
};

document.getElementById('bpm').oninput = (e) => {
  document.getElementById('bpmVal').textContent = e.target.value;
};

init();
</script>
